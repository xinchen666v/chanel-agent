<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chanel Agent 运行过程演示</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { font-size: 28px; color: #f0f6fc; margin-bottom: 6px; }
    .subtitle { color: #8b949e; font-size: 15px; }
    .notice {
      max-width: 640px;
      margin: 14px auto 0;
      padding: 12px 18px;
      background: #1a1f2b;
      border-left: 3px solid #58a6ff;
      border-radius: 6px;
      font-size: 13px;
      color: #8b949e;
      line-height: 1.7;
      text-align: left;
    }
    .notice a { color: #58a6ff; text-decoration: none; }
    .notice a:hover { text-decoration: underline; }

    /* Controls */
    .controls {
      background: #161b22;
      padding: 16px 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 18px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #238636;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; border-color: #21262d; }
    .slider-container { flex: 1; min-width: 160px; }
    input[type="range"] { width: 100%; cursor: pointer; accent-color: #58a6ff; }
    .speed-select { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
    select {
      padding: 4px 8px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 13px;
    }

    /* Timeline bar */
    .timeline {
      background: #161b22;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #30363d;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #8b949e;
    }
    .current-step { font-weight: 600; color: #58a6ff; }

    /* Two-column step layout */
    .step {
      display: none;
      gap: 20px;
      margin-bottom: 20px;
    }
    .step.active {
      display: flex;
    }
    .step-left {
      flex: 1;
      min-width: 0;
    }
    .step-right {
      flex: 1.2;
      min-width: 0;
    }

    /* Desktop simulator (left column) */
    .desktop {
      background: #0d1117;
      border-radius: 12px;
      border: 1px solid #30363d;
      overflow: hidden;
      position: sticky;
      top: 80px;
    }
    .desktop-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    .desktop-dots {
      display: flex;
      gap: 6px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-red { background: #ff5555; }
    .dot-yellow { background: #ffb347; }
    .dot-green { background: #50c878; }
    .desktop-title {
      font-size: 12px;
      color: #8b949e;
      flex: 1;
      text-align: center;
    }

    /* Screen area */
    .screen {
      min-height: 380px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .screen.empty {
      justify-content: center;
    }

    /* App icon */
    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 22px;
      color: white;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .app-icon.vscode       { background: linear-gradient(135deg, #007acc, #1e88e5); }
    .app-icon.visual-studio{ background: linear-gradient(135deg, #5c2d91, #8e44ad); }
    .app-icon.chrome       { background: linear-gradient(135deg, #4285f4, #34a853, #fbbc05, #ea4335); }
    .app-icon.doubao       { background: linear-gradient(135deg, #e84118, #c23616); }
    .app-icon.trae         { background: linear-gradient(135deg, #0d7377, #14919b); }
    .app-icon.terminal     { background: linear-gradient(135deg, #1a1a2e, #16213e); }
    .app-icon.default      { background: linear-gradient(135deg, #555, #777); }

    /* Window mockup inside screen */
    .window-mock {
      width: 100%;
      max-width: 320px;
      background: #1c2128;
      border-radius: 8px;
      border: 1px solid #30363d;
      overflow: hidden;
    }
    .window-titlebar {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      gap: 8px;
    }
    .window-titlebar .btns {
      display: flex;
      gap: 5px;
    }
    .window-titlebar .btns span {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .window-titlebar .btns span:nth-child(1) { background: #ff5555; }
    .window-titlebar .btns span:nth-child(2) { background: #ffb347; }
    .window-titlebar .btns span:nth-child(3) { background: #50c878; }
    .window-titlebar .wt {
      font-size: 11px; color: #8b949e; flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .window-body {
      padding: 16px;
    }
    .window-body .label {
      font-size: 11px;
      color: #484f58;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .window-body .val {
      font-size: 14px;
      color: #e6edf3;
      margin-bottom: 10px;
    }
    .window-body .idle-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .idle-low { background: #1a3a1a; color: #3fb950; }
    .idle-mid { background: #3a2e1a; color: #d29922; }
    .idle-high { background: #3a1a1a; color: #f85149; }

    /* Status bar at bottom of screen */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #161b22;
      border-top: 1px solid #30363d;
      font-size: 11px;
      color: #484f58;
    }
    .status-bar .status-dot {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%; margin-right: 4px;
    }
    .status-bar .status-dot.active { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
    .status-bar .status-dot.away  { background: #d29922; }
    .status-bar .status-dot.idle  { background: #f85149; }

    /* Agent panel (right column) */
    .agent-panel {
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #30363d;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }
    .agent-title {
      font-size: 16px;
      font-weight: 600;
      color: #f0f6fc;
    }
    .agent-time {
      font-size: 12px;
      color: #484f58;
      background: #0d1117;
      padding: 3px 10px;
      border-radius: 10px;
    }
    .agent-inference {
      background: #1c2128;
      padding: 12px 16px;
      border-radius: 8px;
      border-left: 3px solid #d29922;
    }
    .agent-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #484f58;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .agent-text {
      font-size: 14px;
      color: #e6edf3;
      white-space: pre-wrap;
      line-height: 1.65;
    }
    .agent-tools {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .agent-tool {
      background: #0d1117;
      padding: 10px 14px;
      border-radius: 6px;
      border-left: 3px solid #3fb950;
    }
    .agent-tool-name {
      font-size: 12px;
      font-weight: 600;
      color: #3fb950;
      margin-bottom: 3px;
    }
    .agent-tool-content {
      font-size: 13px;
      color: #8b949e;
    }
    .agent-action {
      background: #1c2128;
      padding: 12px 16px;
      border-radius: 8px;
      border-left: 3px solid #bc8cff;
    }
    .agent-action .msg {
      font-size: 14px;
      color: #e6edf3;
      margin-bottom: 8px;
    }
    .agent-action .wake-info {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .agent-action .wake-info strong {
      color: #bc8cff;
    }
    .agent-empty {
      color: #484f58;
      font-size: 13px;
      font-style: italic;
    }

    /* Event badge above screen */
    .event-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .event-badge.wake   { background: #1a3a1a; color: #3fb950; }
    .event-badge.silent { background: #1c2128; color: #8b949e; }
    .event-badge.msg    { background: #3a1a5e; color: #bc8cff; }

    /* Responsive */
    .screen { position: relative; }
    .app-icon.has-svg { background: transparent !important; padding: 6px; }
    .app-icon svg { width: 100%; height: 100%; display: block; }

    /* Bubble animation */
    .bubble-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(1px);
    }
    .bubble-ring {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 2px solid rgba(188, 140, 255, 0.6);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: ringPulse 1.2s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ringPulse {
      0% { width: 50px; height: 50px; opacity: 0.8; }
      100% { width: 220px; height: 220px; opacity: 0; }
    }
    .bubble-card {
      background: linear-gradient(135deg, #1c2128 0%, #2a1a3e 100%);
      border: 2px solid #bc8cff;
      border-radius: 18px;
      padding: 20px 24px;
      max-width: 260px;
      text-align: center;
      box-shadow: 0 0 50px rgba(188, 140, 255, 0.3), 0 8px 32px rgba(0,0,0,0.5);
      animation: bubblePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      position: relative;
      z-index: 21;
    }
    @keyframes bubblePop {
      0% { opacity: 0; transform: scale(0.2) translateY(30px); }
      50% { opacity: 1; transform: scale(1.1); }
      70% { transform: scale(0.94); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .bubble-card .bubble-icon { font-size: 36px; margin-bottom: 6px; }
    .bubble-card .bubble-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #bc8cff;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .bubble-card .bubble-msg {
      font-size: 13px;
      color: #e6edf3;
      line-height: 1.5;
    }

    @media (max-width: 860px) {
      .step.active { flex-direction: column; }
      .desktop { position: static; }
      .screen { min-height: 260px; }
    }
    @media (max-width: 480px) {
      .container { padding: 16px 10px; }
      .controls { flex-direction: column; align-items: stretch; }
      .screen { min-height: 220px; padding: 16px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Chanel Agent</h1>
    <p class="subtitle">从"你问我答"到"我观我动" — 桌面级自主 AI Agent 运行演示</p>
    <div class="notice">
      本页面基于 Chanel Agent 在真实运行中产生的日志数据回放生成，所有步骤、时间戳与决策推理均来自实际运行记录，并非手工编排的演示脚本。Chanel Agent 现已开源，欢迎前往 <a href="https://github.com" target="_blank">GitHub</a> 安装体验。
    </div>
  </header>

  <div class="controls">
    <button id="playBtn">▶ 播放</button>
    <button id="pauseBtn" disabled>⏸ 暂停</button>
    <div class="speed-select">
      <label>速度:</label>
      <select id="speed">
        <option value="4000">很慢</option>
        <option value="3000">慢</option>
        <option value="2000" selected>中</option>
        <option value="1000">快</option>
      </select>
    </div>
    <div class="slider-container">
      <input type="range" id="progress" min="0" max="0" value="0">
    </div>
  </div>

  <div class="timeline">
    <span>第 <span class="current-step" id="currentStep">1</span> / <span id="totalSteps">0</span> 步</span>
    <span>时钟: <span id="clockTime">10:33</span></span>
  </div>

  <div id="stepsContainer"></div>

  <footer style="text-align:center;margin-top:50px;color:#484f58;font-size:13px;">
    Chanel Agent · 真实运行日志回放 · 左侧是你正在做什么，右侧是 Agent 的思考过程
  </footer>
</div>

const currentStepEl = document.getElementById('currentStep');
const totalStepsEl = document.getElementById('totalSteps');
const clockTimeEl = document.getElementById('clockTime');
const speedSelect = document.getElementById('speed');

let currentIndex = 0;
let isPlaying = false;
let timer = null;

function idleClass(s) {
  if (!s || s === '-' || s === '0秒') return 'idle-low';
  const n = parseInt(s);
  if (isNaN(n)) return 'idle-low';
  if (n <= 30) return 'idle-low';
  if (n <= 120) return 'idle-mid';
  return 'idle-high';
}

function renderStep(index) {
  container.innerHTML = '';
  const step = steps[index];
  if (!step) return;

  const el = document.createElement('div');
  el.className = 'step active';
  el.id = 'step-' + index;

  const eventLabel = step.eventType === 'wake' ? '🔔 唤醒' : step.eventType === 'msg' ? '💬 冒泡' : '👁 静默';
  const eventBadgeCls = step.eventType === 'wake' ? 'wake' : step.eventType === 'msg' ? 'msg' : 'silent';

  el.innerHTML = `
    <div class="step-left">
      <div class="desktop">
        <div class="desktop-topbar">
          <div class="desktop-dots">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <div class="desktop-title">${step.title} · ${step.time}</div>
        </div>
        <div class="screen ${!step.active && step.idle !== '0秒' ? 'empty' : ''}">
          <span class="event-badge ${eventBadgeCls}">${eventLabel}</span>
          <div class="app-icon ${step.appIcon} ${SVG_ICONS[step.appIcon] ? 'has-svg' : ''}">
            ${SVG_ICONS[step.appIcon] ? SVG_ICONS[step.appIcon] : (step.appIcon === 'visual-studio' ? 'VS' : '?')}
          </div>
          <div class="window-mock">
            <div class="window-titlebar">
              <div class="btns"><span></span><span></span><span></span></div>
              <div class="wt">${step.app}</div>
            </div>
            <div class="window-body">
              <div class="label">窗口标题</div>
              <div class="val">${step.windowTitle}</div>
              <div class="label">空闲时间</div>
              <div class="val">
                <span class="idle-indicator ${idleClass(step.idle)}">
                  ${step.idle}
                </span>
              </div>
              ${step.desc ? `<div class="label">状态</div><div class="val" style="font-size:13px;color:#8b949e;">${step.desc}</div>` : ''}
            </div>
          </div>
          ${step.eventType === 'msg' ? `
          <div class="bubble-overlay">
            <div class="bubble-ring"></div>
            <div class="bubble-card">
              <div class="bubble-icon">💬</div>
              <div class="bubble-label">主动冒泡</div>
              <div class="bubble-msg">${step.action.text}</div>
            </div>
          </div>` : ''}
        </div>
        <div class="status-bar">
          <span>
            <span class="status-dot ${step.active ? 'active' : (step.app === 'Chrome' && step.idle !== '0秒' && parseInt(step.idle) > 30 ? 'away' : 'idle')}"></span>
            ${step.active ? '用户在线' : '用户离开'}
          </span>
          <span>Agent 感知中</span>
        </div>
      </div>
    </div>
    <div class="step-right">
      <div class="agent-panel">
        <div class="agent-header">
          <span class="agent-title">${index + 1}. ${step.title}</span>
          <span class="agent-time">${step.time}</span>
        </div>

        <div class="agent-inference">
          <div class="agent-label">[推理]</div>
          <div class="agent-text">${step.inference}</div>
        </div>

        <div class="agent-tools">
          <div class="agent-label">工具调用</div>
          ${step.tools && step.tools.length > 0
            ? step.tools.map(t => `
              <div class="agent-tool">
                <div class="agent-tool-name">${t.name}</div>
                <div class="agent-tool-content">${t.content}</div>
              </div>
            `).join('')
            : '<div class="agent-empty">无工具调用</div>'}
        </div>

        <div class="agent-action">
          <div class="agent-label">行动 · 下次唤醒</div>
          <div class="msg">${step.action.text}</div>
          <div class="wake-info">
            <span><strong>⏱ ${step.action.nextWake}</strong></span>
            <span>${step.action.reason}</span>
          </div>
        </div>
      </div>
    </div>
  `;

  container.appendChild(el);
}

function renderAll() {
  renderStep(currentIndex);

  totalStepsEl.textContent = steps.length;
  progress.max = steps.length - 1;
  progress.value = currentIndex;
  currentStepEl.textContent = currentIndex + 1;

  if (currentIndex >= 0 && currentIndex < steps.length) {
    clockTimeEl.textContent = steps[currentIndex].time;
  }
}

function nextStep() {
  if (currentIndex < steps.length - 1) {
    currentIndex++;
    renderAll();
    scheduleNext();
  } else {
    stopPlay();
  }
}

function scheduleNext() {
  const delay = parseInt(speedSelect.value);
  timer = setTimeout(nextStep, delay);
}

function startPlay() {
  isPlaying = true;
  playBtn.disabled = true;
  pauseBtn.disabled = false;
  // Reset to beginning if at end
  if (currentIndex >= steps.length - 1) {
    currentIndex = 0;
    renderAll();
  }
  scheduleNext();
}

function pausePlay() {
  if (timer) { clearTimeout(timer); timer = null; }
  isPlaying = false;
  playBtn.disabled = false;
  pauseBtn.disabled = true;
}

playBtn.addEventListener('click', startPlay);
pauseBtn.addEventListener('click', pausePlay);

progress.addEventListener('input', (e) => {
  const v = parseInt(e.target.value);
  if (v !== currentIndex) {
    currentIndex = v;
    renderAll();
    if (isPlaying && timer) {
      clearTimeout(timer);
      scheduleNext();
    }
  }
});

speedSelect.addEventListener('change', () => {
  if (isPlaying && timer) {
    clearTimeout(timer);
    scheduleNext();
  }
});

// Initial render
renderAll();
</script>
</body>
</html>
